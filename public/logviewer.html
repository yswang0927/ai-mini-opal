<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
  <title>Server Log</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #252526;
      border-bottom: 1px solid #333;
      flex: 0 0 auto;
    }
    header .path {
      flex: 1 1 auto;
      color: #858585;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    button {
      background: #0e639c;
      color: #fff;
      border: none;
      padding: 5px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: #1177bb; }
    button.secondary { background: #3a3d41; }
    button.secondary:hover { background: #45494e; }
    label.toggle { display: flex; align-items: center; gap: 4px; color: #b0b0b0; font-size: 12px; cursor: pointer; }
    pre {
      flex: 1 1 auto;
      margin: 0;
      padding: 10px 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "Cascadia Code", Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    .empty { color: #6a6a6a; }
    .error { color: #f48771; }
  </style>
</head>
<body>
  <header>
    <button id="refresh">刷新</button>
    <button id="clear-view" class="secondary">清屏</button>
    <label class="toggle"><input type="checkbox" id="autoscroll" checked /> 自动滚到底部</label>
    <span class="path" id="path"></span>
  </header>
  <pre id="log"><span class="empty">加载中…</span></pre>
  <script>
    const logEl = document.getElementById('log');
    const pathEl = document.getElementById('path');
    const autoscrollEl = document.getElementById('autoscroll');

    async function load() {
      try {
        const res = await window.electronAPI.readLog();
        pathEl.textContent = res.path || '';
        if (!res.content) {
          logEl.innerHTML = '<span class="empty">(日志为空)</span>';
          return;
        }
        logEl.textContent = res.content;
        if (autoscrollEl.checked) {
          logEl.scrollTop = logEl.scrollHeight;
        }
      } catch (e) {
        logEl.innerHTML = '<span class="error">读取日志失败: ' + String(e) + '</span>';
      } finally {
        // preload 会给每个窗口挂一个全屏 loading 遮罩,靠 removeLoading 消息移除,
        // 否则要等 3 秒的兜底 setTimeout。静态页面首帧加载完立即通知它移除。
        window.postMessage({ payload: 'removeLoading' }, '*');
      }
    }

    document.getElementById('refresh').addEventListener('click', load);
    document.getElementById('clear-view').addEventListener('click', () => {
      logEl.innerHTML = '<span class="empty">(已清屏，点击刷新重新加载)</span>';
    });

    load();
  </script>
</body>
</html>
