  .kpi {

  /* ===== CHART PANELS ===== */
  .panel {
    background: #fff;
    border-radius: 22px;
    padding: 26px;
    border: 1px solid var(--slate-200);

  .two-col {
    display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px;
  }

  /* Bar chart */
  .bar-list { display: flex; flex-direction: column; gap: 14px; }
  .bar-row { display: grid; grid-template-columns: 60px 1fr 130px; gap: 12px; align-items: center; }
  .bar-label {
    font-size: 14px; font-weight: 600; color: var(--slate-800);
    display: flex; align-items: center; gap: 8px;
  }
  .bar-rank {
    width: 22px; height: 22px; border-radius: 6px;

    font-size: 11px; font-weight: 700; color: #fff;
    background: var(--slate-400);

  .bar-rank.r1 { background: linear-gradient(135deg, #F59E0B, #F97316); }
  .bar-rank.r2 { background: linear-gradient(135deg, #3B82F6, #2563EB); }
  .bar-rank.r3 { background: linear-gradient(135deg, #10B981, #059669); }
  .bar-rank.r4, .bar-rank.r5, .bar-rank.r6 { background: var(--slate-400); }

  .bar-track {
    height: 28px; background: var(--slate-100); border-radius: 8px;
    overflow: hidden; position: relative;
  }
  .bar-fill {
    height: 100%; border-radius: 8px;
    background: linear-gradient(90deg, var(--blue-500), var(--cyan-500));
    position: relative;
    animation: barGrow 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    transform-origin: left;
  }
  .bar-fill::after {
    content: &quot;&quot;; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: shimmer 2.5s infinite;
  }
  @keyframes barGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  .bar-value { font-size: 14px; font-weight: 700; color: var(--slate-900); text-align: right; }
  .bar-value small { display: block; font-size: 11px; color: var(--slate-600); font-weight: 500; }

  /* Donut chart */
  .donut-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .donut { position: relative; width: 220px; height: 220px; }
  .donut svg { transform: rotate(-90deg); }
  .donut-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
  }
  .donut-center .t1 { font-size: 11px; color: var(--slate-600); letter-spacing: 1px; text-transform: uppercase; }
  .donut-center .t2 { font-size: 26px; font-weight: 800; color: var(--slate-900); margin-top: 4px; }
  .donut-center .t3 { font-size: 12px; color: var(--slate-600); }

  .legend { width: 100%; display: flex; flex-direction: column; gap: 8px; }

    align-items: center; font-size: 13px;

  .legend-item .sw { width: 10px; height: 10px; border-radius: 3px; }
  .legend-item .name { color: var(--slate-800); font-weight: 500; }

  /* Efficiency table */
  .eff-table {
    width: 100%; border-collapse: separate; border-spacing: 0;
    font-size: 13px;
  }
  .eff-table th {
    text-align: left; padding: 12px 14px;

  .eff-table th:first-child { border-top-left-radius: 12px; }

    color: var(--slate-800); font-variant-numeric: tabular-nums;

  .eff-table tr:last-child td { border-bottom: none; }
  .eff-table tr:hover td { background: var(--slate-50); }
  .eff-table .region-cell { display: flex; align-items: center; gap: 10px; font-weight: 600; }

  /* Line chart */
  .line-chart { width: 100%; height: 260px; }

  /* Findings */
  .findings {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  }
  .finding {

  .finding:hover { transform: translateY(-3px); }
  .finding::before {

  .finding .f-ico {

  .finding .metric .v { font-size: 22px; font-weight: 800; color: var(--blue-600); }
  .finding .metric .l { font-size: 12px; color: var(--slate-600); }

  /* Recommendations */
  .rec-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  }
  .rec {
    background: #fff; border-radius: 20px; padding: 24px;
    border: 1px solid var(--slate-200);
    position: relative;
  }
  .rec-head {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .rec-ico {
    width: 40px; height: 40px; border-radius: 12px;

    flex-shrink: 0;
  }
  .rec-ico.a { background: linear-gradient(135deg, var(--blue-500), var(--blue-600)); }
  .rec-ico.b { background: linear-gradient(135deg, var(--cyan-500), #0891B2); }
  .rec-ico.c { background: linear-gradient(135deg, var(--amber-500), #D97706); }
  .rec-ico.d { background: linear-gradient(135deg, var(--emerald-500), #059669); }
  .rec-ico.e { background: linear-gradient(135deg, var(--violet-500), #7C3AED); }
  .rec-ico.f { background: linear-gradient(135deg, var(--rose-500), #E11D48); }
  .rec h4 { font-size: 15px; font-weight: 700; color: var(--slate-900); }
  .rec .tag {
    font-size: 11px; color: var(--slate-600); margin-top: 2px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .rec ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .rec li {
    font-size: 13px; color: var(--slate-700); padding-left: 22px;
    position: relative; line-height: 1.55;
  }
  .rec li::before {
    content: &quot;&quot;; position: absolute; left: 0; top: 7px;
    width: 12px; height: 12px; border-radius: 4px;
    background: var(--slate-100);
    background-image: linear-gradient(135deg, var(--blue-500), var(--cyan-500));
    mask: url(&quot;data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'&gt;&lt;path d='M20 6L9 17l-5-5' fill='none' stroke='black' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/&gt;&lt;/svg&gt;&quot;) center/contain no-repeat;
    -webkit-mask: url(&quot;data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'&gt;&lt;path d='M20 6L9 17l-5-5' fill='none' stroke='black' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/&gt;&lt;/svg&gt;&quot;) center/contain no-repeat;
  }

  /* Footer note */
  .foot {
    margin-top: 32px; padding: 20px 24px;
    background: linear-gradient(135deg, var(--navy-900), var(--navy-700));
    color: rgba(255,255,255,0.85);
    border-radius: 18px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
    font-size: 13px;
  }
  .foot strong { color: #fff; }

  /* Responsive */
  @media (max-width: 1024px) {
    .kpi.c1, .kpi.c2, .kpi.c3, .kpi.c4 { grid-column: span 6; }
    .kpi.c5, .kpi.c6, .kpi.c7 { grid-column: span 6; }
    .two-col { grid-template-columns: 1fr; }
    .findings, .rec-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 640px) {
    .page { padding: 18px 14px 40px; }
    .hero { padding: 28px 22px; border-radius: 22px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .kpi.c1, .kpi.c2, .kpi.c3, .kpi.c4,
    .kpi.c5, .kpi.c6, .kpi.c7 { grid-column: span 1; }
    .kpi .big { font-size: 26px; }
    .panel { padding: 20px; border-radius: 18px; }
    .findings, .rec-grid { grid-template-columns: 1fr; }
    .bar-row { grid-template-columns: 50px 1fr 90px; gap: 8px; }
    .bar-value { font-size: 12px; }
    .bar-label { font-size: 13px; }
    .eff-table { font-size: 12px; }
    .eff-table th, .eff-table td { padding: 10px 8px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 4px; }
&lt;/style&gt;
